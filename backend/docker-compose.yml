version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: passport_db
    environment:
      POSTGRES_USER: passport_user
      POSTGRES_PASSWORD: passport_pass
      POSTGRES_DB: passport_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U passport_user -d passport_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: passport_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://passport_user:passport_pass@db:5432/passport_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
